version: "3.8"

services:
  app:
    build: .
    container_name: influex_app
    ports:
      - "7000:7000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./public/uploads:/app/public/uploads

  redis:
    image: redis:7-alpine
    container_name: influex_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
